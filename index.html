<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Tech Jobs Portal | Daily Fresher Software Jobs</title>

  <!-- SEO -->
  <meta name="description" content="Find latest fresher and entry-level software jobs in India. Daily updated IT jobs from top MNCs and startups." />
  <meta name="keywords" content="fresher jobs, software jobs, IT jobs, developer jobs, tech jobs India, entry level jobs" />
  <meta name="author" content="Tech Jobs Portal" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://chinthaparthisridhar.in/" />

  <!-- OpenGraph -->
  <meta property="og:title" content="Tech Jobs Portal" />
  <meta property="og:description" content="Daily updated fresher tech jobs in India" />
  <meta property="og:type" content="website" />

  <!-- Schema -->
  <script type="application/ld+json">
    {
      "@context":"https://schema.org",
      "@type":"JobBoard",
      "name":"Tech Jobs Portal",
      "description":"Daily fresher IT jobs in India"
    }
  </script>

  <!-- Fonts: Syne (display) + DM Sans (body) -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep:    #060d1a;
      --bg-card:    rgba(255,255,255,0.04);
      --border:     rgba(255,255,255,0.08);
      --accent:     #00e5ff;
      --accent2:    #0ea5e9;
      --text:       #e2e8f0;
      --muted:      #64748b;
      --danger:     #f87171;
      --success:    #34d399;
      --radius-lg:  18px;
      --radius-md:  12px;
      --radius-sm:  8px;
    }

    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      min-height: 100vh;
      color: var(--text);
      /* Subtle animated grid background */
      background-image:
        linear-gradient(135deg, #060d1a 0%, #0d1f35 50%, #060d1a 100%),
        radial-gradient(ellipse at 20% 50%, rgba(0,229,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(14,165,233,0.05) 0%, transparent 50%);
      background-blend-mode: normal;
    }

    /* Animated subtle grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 24px 20px;
      position: relative;
      z-index: 1;
    }

    /* ─── HEADER ─────────────────────────────────────────── */
    header {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 36px 32px 28px;
      border-radius: var(--radius-lg);
      text-align: center;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: '';
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 400px; height: 160px;
      background: radial-gradient(ellipse, rgba(0,229,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      background: linear-gradient(90deg, #00e5ff, #38bdf8, #00e5ff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
      letter-spacing: -0.5px;
    }

    @keyframes shimmer {
      to { background-position: 200% center; }
    }

    header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 400;
    }

    .header-admin-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 18px;
      padding: 9px 20px;
      background: rgba(0,229,255,0.1);
      border: 1px solid rgba(0,229,255,0.25);
      border-radius: 30px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.25s ease;
    }

    .header-admin-btn:hover {
      background: rgba(0,229,255,0.18);
      box-shadow: 0 0 20px rgba(0,229,255,0.2);
    }

    /* ─── CONTROLS ───────────────────────────────────────── */
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 16px;
      border-radius: var(--radius-md);
      margin-bottom: 18px;
      border: 1px solid var(--border);
    }

    .controls input,
    .controls select {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      transition: border-color 0.25s, box-shadow 0.25s;
      width: 100%;
    }

    .controls input::placeholder { color: var(--muted); }

    .controls select option {
      background: #0d1f35;
      color: var(--text);
    }

    .controls input:focus,
    .controls select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.12);
    }

    .search-box { flex: 3; min-width: 200px; }
    .filter-box { flex: 1; min-width: 160px; }

    /* ─── STATS ──────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat-card {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-md);
      padding: 20px 16px;
      text-align: center;
      border: 1px solid var(--border);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      border-color: rgba(0,229,255,0.25);
    }

    .stats-number {
      display: block;
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
    }

    /* ─── TABLE CONTAINER ────────────────────────────────── */
    .table-container {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    thead {
      background: rgba(0,229,255,0.05);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 14px 18px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
      font-weight: 600;
      text-align: left;
      white-space: nowrap;
    }

    td {
      padding: 14px 18px;
      border-top: 1px solid rgba(255,255,255,0.04);
      font-size: 14px;
      vertical-align: middle;
    }

    tbody tr {
      transition: background 0.2s ease;
      animation: fadeRow 0.3s ease both;
    }

    @keyframes fadeRow {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    tbody tr:hover {
      background: rgba(0,229,255,0.05);
    }

    .company-name {
      font-weight: 600;
      color: #f1f5f9;
    }

    .role-name {
      color: #cbd5e1;
    }

    /* ─── BADGES ─────────────────────────────────────────── */
    .category-badge {
      display: inline-block;
      background: rgba(0,229,255,0.12);
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      border: 1px solid rgba(0,229,255,0.2);
      white-space: nowrap;
    }

    .date-badge {
      display: inline-block;
      background: rgba(255,255,255,0.06);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ─── APPLY BUTTON ───────────────────────────────────── */
    .apply-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, #00e5ff, #0ea5e9);
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: #060d1a;
      font-weight: 700;
      font-size: 12px;
      transition: all 0.25s ease;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }

    .apply-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0,229,255,0.35);
    }

    /* ─── EMPTY / LOADING STATE ──────────────────────────── */
    .state-row td {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 15px;
    }

    .spinner {
      display: inline-block;
      width: 22px; height: 22px;
      border: 2px solid rgba(0,229,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 10px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── PAGINATION ─────────────────────────────────────── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 20px 16px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .page-btn {
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 38px;
      text-align: center;
    }

    .page-btn:hover:not(:disabled) {
      background: rgba(0,229,255,0.1);
      border-color: rgba(0,229,255,0.3);
      color: var(--accent);
    }

    .page-btn.active {
      background: rgba(0,229,255,0.15);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    .page-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-info {
      font-size: 13px;
      color: var(--muted);
      padding: 0 8px;
    }

    /* ─── FOOTER ─────────────────────────────────────────── */
    footer {
      text-align: center;
      margin-top: 24px;
      color: var(--muted);
      font-size: 13px;
      padding-bottom: 12px;
    }

    /* ─── MOBILE ─────────────────────────────────────────── */
    @media (max-width: 768px) {
      .container { padding: 16px 14px; }

      header { padding: 28px 20px 22px; }

      .controls { flex-direction: column; gap: 10px; }
      .search-box, .filter-box { flex: none; width: 100%; }

      .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-card { padding: 14px 8px; }
      .stats-number { font-size: 22px; }
      .stat-label { font-size: 10px; }

      th, td { padding: 12px 12px; }

      .apply-btn { padding: 7px 13px; font-size: 11px; }

      .pagination { gap: 6px; }
      .page-btn { padding: 7px 10px; font-size: 12px; min-width: 34px; }
    }

    @media (max-width: 480px) {
      .stats { grid-template-columns: repeat(3, 1fr); }
      .stats-number { font-size: 18px; }
    }
  </style>
</head>

<body>
  <main class="container">

    <!-- HEADER -->
    <header>
      <h1>⚡ Tech Jobs Portal</h1>
      <p>Daily Fresher &amp; Entry-Level IT Jobs · Updated Every Day</p>
      <a href="https://chinthaparthisridhar.in" target="_blank" rel="noopener noreferrer"
         class="header-admin-btn" title="Go to Admin Panel">
        🔧 Admin Panel
      </a>
    </header>

    <!-- CONTROLS -->
    <section class="controls" aria-label="Search and filter">
      <div class="search-box">
        <input id="searchInput" type="search" placeholder="🔍  Search company, role or category…"
          aria-label="Search jobs" autocomplete="off" />
      </div>
      <div class="filter-box">
        <select id="categoryFilter" aria-label="Filter by category">
          <option value="">All Categories</option>
        </select>
      </div>
    </section>

    <!-- STATS -->
    <section class="stats" aria-label="Job statistics">
      <div class="stat-card">
        <span id="totalJobs" class="stats-number">0</span>
        <span class="stat-label">Total Jobs</span>
      </div>
      <div class="stat-card">
        <span id="companiesCount" class="stats-number">0</span>
        <span class="stat-label">Companies</span>
      </div>
      <div class="stat-card">
        <span id="filteredCount" class="stats-number">0</span>
        <span class="stat-label">Showing</span>
      </div>
    </section>

    <!-- TABLE -->
    <section class="table-container">
      <div class="table-scroll">
        <table aria-label="Jobs Table">
          <thead>
            <tr>
              <th>Company</th>
              <th>Role</th>
              <th>Category</th>
              <th>Date</th>
              <th>Apply</th>
            </tr>
          </thead>
          <tbody id="jobsTableBody">
            <tr class="state-row">
              <td colspan="5">
                <span class="spinner"></span> Loading jobs…
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- PAGINATION -->
      <div class="pagination" id="pagination" aria-label="Pagination"></div>
    </section>

    <footer>
      <p>© 2025 Tech Jobs Portal · Built for freshers across India 🇮🇳</p>
    </footer>

  </main>

  <script>
    // ── Config ─────────────────────────────────────────────
    const SHEET_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vTl18ACAimHKP6rnGtCqx8OVsIDay1hOfw67U5EwYmMOL77jUfo3QIZmjIh5589YV4Kp22hIHygLWla/pub?output=csv";

    const PAGE_SIZE = 25;

    // ── State ──────────────────────────────────────────────
    let allJobs      = [];
    let filteredJobs = [];
    let currentPage  = 1;

    // ── CSV Parser (handles quoted fields with commas) ─────
    function parseCSV(text) {
      const rows = [];
      const lines = text.trim().split(/\r?\n/);
      for (const line of lines) {
        const cols = [];
        let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            if (inQ && line[i+1] === '"') { cur += '"'; i++; }
            else inQ = !inQ;
          } else if (ch === ',' && !inQ) {
            cols.push(cur.trim()); cur = '';
          } else {
            cur += ch;
          }
        }
        cols.push(cur.trim());
        rows.push(cols);
      }
      return rows;
    }

    // ── Load Jobs from Sheet ───────────────────────────────
    async function loadJobs() {
      try {
        const res = await fetch(SHEET_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const csv  = await res.text();
        const rows = parseCSV(csv);

        allJobs = rows.slice(1)
          .map(r => ({
            company:  r[0] || "",
            role:     r[1] || "",
            category: r[2] || "",
            date:     r[3] || "",
            link:     r[4] || ""
          }))
          .filter(j => j.company.trim());

        allJobs.reverse(); // newest first
        filteredJobs = [...allJobs];

        populateFilters();
        renderPage();

      } catch (err) {
        document.getElementById("jobsTableBody").innerHTML =
          `<tr class="state-row"><td colspan="5">⚠️ Failed to load jobs. Please try again later.</td></tr>`;
        console.error("loadJobs error:", err);
      }
    }

    // ── Populate Category Filter ───────────────────────────
    function populateFilters() {
      const sel  = document.getElementById("categoryFilter");
      const cats = [...new Set(
        allJobs.map(j => j.category.trim()).filter(Boolean)
      )].sort();

      cats.forEach(c => {
        const opt = document.createElement("option");
        opt.value       = c.toLowerCase();
        opt.textContent = c;
        sel.appendChild(opt);
      });
    }

    // ── Render current page of filteredJobs ───────────────
    function renderPage() {
      const body  = document.getElementById("jobsTableBody");
      const start = (currentPage - 1) * PAGE_SIZE;
      const slice = filteredJobs.slice(start, start + PAGE_SIZE);

      // Update stats
      document.getElementById("totalJobs").textContent     = allJobs.length;
      document.getElementById("companiesCount").textContent =
        new Set(allJobs.map(j => j.company)).size;
      document.getElementById("filteredCount").textContent = filteredJobs.length;

      if (!filteredJobs.length) {
        body.innerHTML =
          `<tr class="state-row"><td colspan="5">😔 No jobs match your search.</td></tr>`;
        renderPagination();
        return;
      }

      const frag = document.createDocumentFragment();
      slice.forEach((j, idx) => {
        const tr  = document.createElement("tr");
        tr.style.animationDelay = `${idx * 20}ms`;
        const safeLink = j.link.startsWith("http") ? j.link : "#";
        tr.innerHTML = `
          <td><span class="company-name">${escHtml(j.company)}</span></td>
          <td><span class="role-name">${escHtml(j.role)}</span></td>
          <td><span class="category-badge">${escHtml(j.category)}</span></td>
          <td><span class="date-badge">${escHtml(j.date)}</span></td>
          <td>
            <a href="${safeLink}" target="_blank" rel="noopener noreferrer"
               class="apply-btn" aria-label="Apply for ${escHtml(j.role)} at ${escHtml(j.company)}">
              Apply ↗
            </a>
          </td>
        `;
        frag.appendChild(tr);
      });

      body.innerHTML = "";
      body.appendChild(frag);
      renderPagination();
    }

    // ── Pagination ─────────────────────────────────────────
    function renderPagination() {
      const pag        = document.getElementById("pagination");
      const totalPages = Math.ceil(filteredJobs.length / PAGE_SIZE);

      if (totalPages <= 1) { pag.innerHTML = ""; return; }

      let html = `
        <button class="page-btn" onclick="goPage(${currentPage - 1})"
          ${currentPage === 1 ? "disabled" : ""} aria-label="Previous page">‹ Prev</button>
      `;

      // Show window of pages
      const range = getPageRange(currentPage, totalPages);
      range.forEach(p => {
        if (p === "…") {
          html += `<span class="page-info">…</span>`;
        } else {
          html += `<button class="page-btn ${p === currentPage ? "active" : ""}"
            onclick="goPage(${p})" aria-label="Page ${p}">${p}</button>`;
        }
      });

      html += `
        <button class="page-btn" onclick="goPage(${currentPage + 1})"
          ${currentPage === totalPages ? "disabled" : ""} aria-label="Next page">Next ›</button>
        <span class="page-info">Page ${currentPage} of ${totalPages}</span>
      `;

      pag.innerHTML = html;
    }

    function getPageRange(cur, total) {
      if (total <= 7) return Array.from({length: total}, (_, i) => i + 1);
      if (cur <= 4)   return [1,2,3,4,5,"…",total];
      if (cur >= total - 3) return [1,"…",total-4,total-3,total-2,total-1,total];
      return [1,"…",cur-1,cur,cur+1,"…",total];
    }

    function goPage(p) {
      const totalPages = Math.ceil(filteredJobs.length / PAGE_SIZE);
      if (p < 1 || p > totalPages) return;
      currentPage = p;
      renderPage();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    // ── Filter Logic ───────────────────────────────────────
    function filterJobs() {
      const search = document.getElementById("searchInput").value.toLowerCase().trim();
      const cat    = document.getElementById("categoryFilter").value;

      filteredJobs = allJobs.filter(j => {
        const txt = `${j.company} ${j.role} ${j.category}`.toLowerCase();
        return (!search || txt.includes(search)) &&
               (!cat    || j.category.toLowerCase() === cat);
      });

      currentPage = 1;
      renderPage();
    }

    // ── Helpers ────────────────────────────────────────────
    function escHtml(str) {
      return str
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;");
    }

    function debounce(fn, delay = 300) {
      let timer;
      return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
    }

    // ── Event Listeners ────────────────────────────────────
    document.getElementById("searchInput")
      .addEventListener("input", debounce(filterJobs, 250));
    document.getElementById("categoryFilter")
      .addEventListener("change", filterJobs);

    // ── Boot ───────────────────────────────────────────────
    loadJobs();
  </script>

</body>
</html>
